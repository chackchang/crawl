<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Crawler - 网站爬虫</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --primary-light: #eef2ff;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --radius: 14px;
    --shadow: 0 1px 3px 0 rgba(0,0,0,.06), 0 1px 2px -1px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 25px -5px rgba(0,0,0,.08), 0 4px 10px -6px rgba(0,0,0,.04);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ---- Header ---- */
  .header {
    background: linear-gradient(135deg, #312e81 0%, #4f46e5 50%, #6366f1 100%);
    color: #fff;
    padding: 28px 0 24px;
    box-shadow: 0 4px 20px rgba(79,70,229,.25);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,.18);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em; }
  .header p  { font-size: .85rem; opacity: .8; margin-top: 2px; }

  /* ---- Layout ---- */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ---- Card ---- */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 30px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }

  /* ---- Form ---- */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    display: block;
    font-size: .82rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: .95rem;
    transition: all .15s;
    background: #fafbfc;
    color: var(--text);
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    background: #fff;
  }
  .form-group input.error { border-color: var(--danger); }

  /* Keyword tags */
  .tag-area {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: #fafbfc;
    min-height: 44px;
    cursor: text;
    align-items: center;
    transition: all .15s;
  }
  .tag-area:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    background: #fff;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: .82rem;
    font-weight: 500;
  }
  .tag .tag-close {
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    opacity: .6;
    transition: opacity .1s;
  }
  .tag .tag-close:hover { opacity: 1; }
  .tag-input {
    border: none;
    outline: none;
    background: transparent;
    flex: 1;
    min-width: 100px;
    font-size: .93rem;
    color: var(--text);
    font-family: inherit;
    padding: 2px 0;
  }
  .hint {
    font-size: .75rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 11px 24px;
    border-radius: 10px;
    font-size: .93rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
    letter-spacing: .01em;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-outline {
    background: #fff;
    color: var(--primary);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover { background: var(--primary-light); border-color: var(--primary); }
  .btn-sm { padding: 6px 14px; font-size: .8rem; border-radius: 8px; }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }

  /* Progress */
  .progress-bar-wrap {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4f46e5, #818cf8);
    border-radius: 3px;
    transition: width .4s ease;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: .82rem;
    color: var(--text-secondary);
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: .78rem;
    font-weight: 600;
  }
  .status-running { background: #fef3c7; color: #92400e; }
  .status-done    { background: #d1fae5; color: #065f46; }
  .status-error   { background: #fee2e2; color: #991b1b; }

  /* Results */
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .results-count {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
  }
  .results-count span { color: var(--primary); }
  .results-filter input {
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .85rem;
    width: 200px;
    font-family: inherit;
  }
  .results-filter input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .result-card {
    display: flex;
    gap: 14px;
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    transition: all .12s;
    background: #fafbfc;
  }
  .result-card:hover {
    background: #fff;
    box-shadow: var(--shadow-lg);
    border-color: #cbd5e1;
  }
  .result-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .result-icon.title-icon   { background: #dbeafe; color: #2563eb; }
  .result-icon.comment-icon { background: #fce7f3; color: #db2777; }

  .result-body { flex: 1; min-width: 0; }
  .result-type {
    display: inline-block;
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .result-type.title   { background: #dbeafe; color: #1d4ed8; }
  .result-type.comment { background: #fce7f3; color: #be185d; }

  .result-text {
    font-size: .93rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .result-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    font-size: .78rem;
    color: var(--text-secondary);
  }
  .result-meta a {
    color: var(--primary);
    text-decoration: none;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-meta a:hover { text-decoration: underline; }
  .keyword-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    background: #fef3c7;
    color: #92400e;
    font-size: .72rem;
    font-weight: 600;
  }
  .keyword-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .copy-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 4px;
    border-radius: 4px;
    font-size: .85rem;
    transition: color .1s;
  }
  .copy-btn:hover { color: var(--primary); }

  /* Empty & error states */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-secondary);
  }
  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 12px;
    opacity: .5;
  }
  .empty-state h3 {
    font-size: 1.1rem;
    margin-bottom: 6px;
    color: var(--text);
  }
  .error-banner {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: .9rem;
    margin-bottom: 16px;
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 20px; height: 20px;
    border: 2.5px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  .spinner-dark {
    border-color: rgba(79,70,229,.15);
    border-top-color: var(--primary);
  }

  /* Responsive */
  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr; }
    .results-header { flex-direction: column; align-items: flex-start; }
    .result-meta { flex-direction: column; align-items: flex-start; gap: 4px; }
  }

  /* highlight matched */
  .highlight {
    background: #fde68a;
    padding: 1px 3px;
    border-radius: 3px;
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="header-icon">🕷️</div>
    <div>
      <h1>Web Crawler</h1>
      <p>输入网站和关键词，自动抓取匹配的标题与评论</p>
    </div>
  </div>
</div>

<div class="container">

  <!-- Input Card -->
  <div class="card" id="inputCard">
    <div class="form-grid">
      <div class="form-group full">
        <label>目标网站 URL</label>
        <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off">
      </div>
      <div class="form-group full">
        <label>搜索关键词</label>
        <div class="tag-area" id="tagArea">
          <input type="text" class="tag-input" id="keywordInput" placeholder="输入关键词后按回车添加...">
        </div>
        <p class="hint">按 Enter 添加关键词，支持多个关键词同时搜索</p>
      </div>
      <div class="form-group">
        <label>爬取深度</label>
        <select id="depthSelect">
          <option value="1">仅当前页面</option>
          <option value="2" selected>2 层（推荐）</option>
          <option value="3">3 层（较慢）</option>
          <option value="4">4 层（很慢）</option>
        </select>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <div style="display:flex;align-items:center;height:44px;gap:8px;color:var(--text-secondary);font-size:.85rem">
          <span>📊</span> 最多爬取 30 个页面
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn" onclick="startCrawl()">
        🚀 开始爬取
      </button>
      <button class="btn btn-outline" id="stopBtn" style="display:none" onclick="clearResults()">
        清空结果
      </button>
    </div>
  </div>

  <!-- Progress Card -->
  <div class="card" id="progressCard" style="display:none">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="spinner spinner-dark" id="spinnerIcon"></div>
      <span style="font-weight:600" id="progressLabel">正在爬取...</span>
      <span class="status-badge status-running" id="statusBadge">进行中</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-text">
      <span id="progressMsg">初始化...</span>
      <span id="progressPages">0 / 30 页</span>
    </div>
  </div>

  <!-- Error Banner -->
  <div class="error-banner" id="errorBanner" style="display:none"></div>

  <!-- Results Card -->
  <div class="card" id="resultsCard" style="display:none">
    <div class="results-header">
      <div class="results-count" id="resultsCount">找到 <span>0</span> 条匹配结果</div>
      <div class="results-filter">
        <input type="text" id="filterInput" placeholder="🔍 筛选结果..." oninput="filterResults()">
      </div>
    </div>
    <div id="resultsList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">📭</div>
      <h3>没有找到匹配结果</h3>
      <p>尝试更换关键词或调整爬取深度</p>
    </div>
  </div>

</div>

<script>
// ---- State ----
let keywords = [];
let currentResults = [];
let pollTimer = null;

// ---- Keyword Tags ----
const tagArea = document.getElementById('tagArea');
const keywordInput = document.getElementById('keywordInput');

tagArea.addEventListener('click', () => keywordInput.focus());

keywordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addKeyword(keywordInput.value.trim());
  }
  if (e.key === 'Backspace' && keywordInput.value === '' && keywords.length > 0) {
    removeKeyword(keywords.length - 1);
  }
});

keywordInput.addEventListener('paste', (e) => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text');
  text.split(/[,，\n]+/).forEach(t => addKeyword(t.trim()));
});

function addKeyword(text) {
  if (!text) return;
  // deduplicate
  if (keywords.some(k => k.toLowerCase() === text.toLowerCase())) {
    keywordInput.value = '';
    return;
  }
  keywords.push(text);
  renderTags();
  keywordInput.value = '';
  keywordInput.focus();
}

function removeKeyword(idx) {
  keywords.splice(idx, 1);
  renderTags();
  keywordInput.focus();
}

function renderTags() {
  tagArea.querySelectorAll('.tag').forEach(t => t.remove());
  keywords.forEach((kw, i) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${escapeHtml(kw)} <span class="tag-close" data-idx="${i}">&times;</span>`;
    tagArea.insertBefore(tag, keywordInput);
    tag.querySelector('.tag-close').addEventListener('click', (e) => {
      e.stopPropagation();
      removeKeyword(i);
    });
  });
}

// ---- URL quick validation ----
document.getElementById('urlInput').addEventListener('blur', function() {
  const val = this.value.trim();
  if (val && !/^https?:\/\//.test(val)) {
    // don't auto-prefix, just hint
  }
});

// ---- Crawl ----
async function startCrawl() {
  const urlInput = document.getElementById('urlInput');
  let url = urlInput.value.trim();

  if (!url) {
    urlInput.classList.add('error');
    urlInput.focus();
    return;
  }
  urlInput.classList.remove('error');

  if (keywords.length === 0) {
    keywordInput.focus();
    tagArea.style.borderColor = 'var(--danger)';
    setTimeout(() => tagArea.style.borderColor = '', 2000);
    return;
  }

  const depth = parseInt(document.getElementById('depthSelect').value) || 2;

  // UI: show progress
  document.getElementById('progressCard').style.display = '';
  document.getElementById('resultsCard').style.display = 'none';
  document.getElementById('errorBanner').style.display = 'none';
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').style.display = '';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressLabel').textContent = '正在连接...';
  document.getElementById('progressMsg').textContent = '初始化...';
  document.getElementById('progressPages').textContent = '0 / 30 页';
  document.getElementById('statusBadge').textContent = '进行中';
  document.getElementById('statusBadge').className = 'status-badge status-running';

  try {
    const resp = await fetch('/api/crawl', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, keywords, max_depth: depth }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || '请求失败');
    }

    const { task_id } = await resp.json();
    pollTask(task_id);
  } catch (err) {
    showError(err.message);
  }
}

function pollTask(taskId) {
  if (pollTimer) clearInterval(pollTimer);

  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch(`/api/status/${taskId}`);
      if (!resp.ok) throw new Error('获取状态失败');

      const data = await resp.json();

      // Update progress
      const pct = Math.min(100, Math.round((data.progress.crawled / 30) * 100));
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressMsg').textContent = data.progress.message || '';
      document.getElementById('progressPages').textContent = `${data.progress.crawled} / 30 页`;

      if (data.status === 'completed') {
        clearInterval(pollTimer);
        pollTimer = null;
        document.getElementById('statusBadge').textContent = '已完成';
        document.getElementById('statusBadge').className = 'status-badge status-done';
        document.getElementById('progressLabel').textContent = data.progress.message || '爬取完成';
        document.getElementById('spinnerIcon').style.display = 'none';
        document.getElementById('startBtn').disabled = false;

        currentResults = data.results || [];
        renderResults();
      } else if (data.status === 'error') {
        clearInterval(pollTimer);
        pollTimer = null;
        document.getElementById('statusBadge').textContent = '出错';
        document.getElementById('statusBadge').className = 'status-badge status-error';
        document.getElementById('progressLabel').textContent = '爬取出错';
        document.getElementById('spinnerIcon').style.display = 'none';
        document.getElementById('startBtn').disabled = false;
        showError(data.progress.message || '未知错误');
      }
    } catch (err) {
      clearInterval(pollTimer);
      pollTimer = null;
      document.getElementById('startBtn').disabled = false;
      showError(err.message);
    }
  }, 800);
}

function clearResults() {
  currentResults = [];
  keywords = [];
  renderTags();
  document.getElementById('resultsCard').style.display = 'none';
  document.getElementById('progressCard').style.display = 'none';
  document.getElementById('errorBanner').style.display = 'none';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('urlInput').value = '';
}

// ---- Render ----
function renderResults() {
  const card = document.getElementById('resultsCard');
  const list = document.getElementById('resultsList');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('resultsCount');

  card.style.display = '';
  document.getElementById('filterInput').value = '';
  displayResults(currentResults);
}

function displayResults(results) {
  const list = document.getElementById('resultsList');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('resultsCount');

  countEl.innerHTML = `找到 <span>${results.length}</span> 条匹配结果`;

  if (results.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = results.map((r, i) => `
    <div class="result-card">
      <div class="result-icon ${r.type}-icon">
        ${r.type === 'title' ? '📌' : '💬'}
      </div>
      <div class="result-body">
        <span class="result-type ${r.type}">${r.type === 'title' ? '标题' : '评论'}</span>
        ${r.author ? `<span style="font-size:.75rem;color:var(--text-secondary);margin-left:8px">— ${escapeHtml(r.author)}</span>` : ''}
        <div class="result-text">${highlightText(r.text, r.matched_keywords)}</div>
        <div class="result-meta">
          <a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">🔗 ${escapeHtml(truncateUrl(r.url, 60))}</a>
          <button class="copy-btn" onclick="copyUrl('${escapeAttr(r.url)}')" title="复制链接">📋</button>
          <div class="keyword-tags">
            ${r.matched_keywords.map(k => `<span class="keyword-tag">${escapeHtml(k)}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function filterResults() {
  const q = document.getElementById('filterInput').value.trim().toLowerCase();
  if (!q) {
    displayResults(currentResults);
    return;
  }
  const filtered = currentResults.filter(r =>
    r.text.toLowerCase().includes(q) ||
    r.matched_keywords.some(k => k.includes(q)) ||
    r.url.toLowerCase().includes(q)
  );
  displayResults(filtered);
}

function highlightText(text, keywords) {
  let result = escapeHtml(text);
  keywords.forEach(kw => {
    const escaped = escapeHtml(kw);
    const regex = new RegExp(`(${escaped.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(regex, '<mark class="highlight">$1</mark>');
  });
  return result;
}

function showError(msg) {
  const banner = document.getElementById('errorBanner');
  banner.textContent = '❌ ' + msg;
  banner.style.display = '';
  document.getElementById('startBtn').disabled = false;
}

// ---- Utilities ----
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escapeAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function truncateUrl(url, max) {
  return url.length > max ? url.substring(0, max) + '...' : url;
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => {
    // tiny feedback
  }).catch(() => {});
}
</script>
